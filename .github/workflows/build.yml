name: build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test

      - name: Build Thunderbird Agent artifacts
        run: npm run build

      - name: Check npm package contents
        run: npm run pack:check

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: thunderbird-agent-build-${{ github.sha }}
          if-no-files-found: error
          path: |
            dist/thunderbird-agent.xpi
            shared/tool-catalog.json
